<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <!-- Keep this page out of search engines; intended for private evaluation only -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <title>Calculator</title>
  <style>
    /* ================================================================= *
     *  Calculator — Material Design 3 dark theme.                        *
     *  Self-contained: all visuals are CSS shapes, color tokens and SVG  *
     *  (no image assets).                                                *
     * ================================================================= */

    *, *::before, *::after { box-sizing: border-box; }

    /* Device / viewport custom properties. The layout script keeps these
       in sync with the real window dimensions and the system safe-area. */
    :root {
      --app-h: 100vh;
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      /* ---- Material 3 color roles (baseline dark on true black) ---- */
      --md-bg:                  #000000;   /* OLED / lock-screen field   */
      --md-on-surface:          #ECEAF2;   /* display text               */
      --md-on-surface-variant:  #CAC4D0;   /* info icon, secondary text  */

      /* number keys (0–9, .) — neutral surface containers */
      --md-num-container:       #2A2A2E;
      --md-num-container-press: #36363C;
      --md-on-num:              #ECEAF2;

      /* function keys (C/AC, +/-) — quietest tier */
      --md-fn-container:        #1C1B20;
      --md-fn-container-press:  #2A2830;
      --md-on-fn:              #D0BCFF;     /* accent-tinted glyph        */

      /* operator keys (÷ × − +) — accent family (secondary container) */
      --md-op-container:        #4A4458;
      --md-op-container-press:  #574F66;
      --md-on-op:               #E8DEF8;

      /* armed operator — morphs to PRIMARY (the accent "glow") */
      --md-op-active-container: #D0BCFF;
      --md-on-op-active:        #381E72;

      /* equals — dominant CTA (primary filled) */
      --md-eq-container:        #D0BCFF;
      --md-eq-container-press:  #DECEFF;
      --md-on-eq:               #381E72;

      /* dialog */
      --md-surface-container-high: #2B2930;
      --md-scrim: rgba(0, 0, 0, 0.6);

      /* shape */
      --shape-key:        50%;
      --shape-pill:       999px;

      /* motion — spatial spring (slight overshoot) + effect (no overshoot) */
      --ease-spatial: cubic-bezier(0.2, 0.9, 0.25, 1.25);
      --ease-effect:  cubic-bezier(0.2, 0, 0, 1);
      --dur-press:    110ms;
      --dur-release:  280ms;
      --dur-ripple:   480ms;

      --font: Roboto, "Google Sans", system-ui, -apple-system, "Segoe UI",
              "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    @supports (height: 100dvh) {
      :root { --app-h: 100dvh; }
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--md-bg);
      color: var(--md-on-surface);
      font-family: var(--font);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: var(--app-h);
      background: var(--md-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Top: display ===== flat, no panel (M3 Expressive removes the
       display container). The number floats on the black field. */
    .display {
      flex: 1 1 auto;
      min-height: 12vh;
      width: 100%;
      background: transparent;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 0 6% 4% 6%;
      container-type: size;
      container-name: display;
      position: relative;
      overflow: hidden;
    }

    /* ===== Info button (top-left) ===== Material outlined "info" icon. */
    .info-btn {
      position: absolute;
      left: clamp(10px, 4%, 24px);
      /* JS (positionInfoButton) sets `top` to the vertical center of the
         result label; this is the pre-JS fallback. */
      top: 50%;
      transform: translateY(-50%);
      width:  clamp(40px, 11vmin, 48px);
      height: clamp(40px, 11vmin, 48px);
      padding: 0;
      margin: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--md-on-surface-variant);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background-color var(--dur-press) var(--ease-effect);
      z-index: 2;
    }
    .info-btn:hover  { background-color: rgba(202, 196, 208, 0.08); }
    .info-btn:active { background-color: rgba(202, 196, 208, 0.12); }
    .info-btn:focus  { outline: none; }
    .info-btn:focus-visible {
      outline: 2px solid var(--md-on-surface-variant);
      outline-offset: 2px;
    }
    .info-btn svg {
      width: 58%;
      height: 58%;
      display: block;
    }

    /* ===== About overlay (M3 dialog) ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: var(--md-scrim);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
      opacity: 0;
      transition: opacity 180ms var(--ease-effect);
    }
    .overlay.is-open {
      display: flex;
      opacity: 1;
    }

    .about-card {
      width: min(92vw, 340px);
      background: var(--md-surface-container-high);
      border-radius: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
      color: var(--md-on-surface);
      font-family: var(--font);
      padding: 26px 24px 22px;
      transform: translateY(12px) scale(0.96);
      opacity: 0;
      transition: transform var(--dur-release) var(--ease-spatial),
                  opacity 180ms var(--ease-effect);
      pointer-events: auto;
    }
    .overlay.is-open .about-card {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .about-header {
      text-align: center;
      margin: 0 0 24px;
    }
    .about-title {
      margin: 0;
      font-family: var(--font);
      font-weight: 500;
      font-size: 24px;
      letter-spacing: 0;
      color: var(--md-on-surface);
      line-height: 1.2;
    }
    .about-version {
      margin: 6px 0 0;
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0.01em;
      color: var(--md-on-surface-variant);
    }

    .about-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .about-actions .divider { display: none; }

    /* Filled-tonal Material buttons (secondary container). */
    .about-btn {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      display: block;
      width: 100%;
      padding: 14px 20px;
      border: 0;
      border-radius: var(--shape-pill);
      overflow: hidden;
      font-family: var(--font);
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.01em;
      text-align: center;
      text-decoration: none;
      color: var(--md-on-op);
      background: var(--md-op-container);
      cursor: pointer;
      transition: filter var(--dur-press) var(--ease-effect),
                  transform var(--dur-release) var(--ease-spatial);
      -webkit-tap-highlight-color: transparent;
    }
    .about-btn:hover  { filter: brightness(1.08); }
    .about-btn:focus  { outline: none; }
    .about-btn:focus-visible {
      outline: 2px solid var(--md-on-surface-variant);
      outline-offset: 2px;
    }
    .about-btn:active { transform: scale(0.97); filter: brightness(0.94); }
    /* "Close" reads as the primary affirmative action. */
    #about-close {
      color: var(--md-on-eq);
      background: var(--md-eq-container);
    }

    /* ===== Test panels (Flashlight / Theme) =====
       Reuse the dialog scrim + card, but left-align content and allow the
       card to scroll because the diagnostic output can grow tall on a small
       lock-screen viewport. */
    .about-card.is-panel {
      text-align: left;
      width: min(94vw, 400px);
      max-height: min(86vh, 88dvh);
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 22px 20px 18px;
    }
    .panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
    }
    .panel-title {
      margin: 0;
      font-family: var(--font);
      font-weight: 500;
      font-size: 20px;
      color: var(--md-on-surface);
      line-height: 1.2;
      flex: 1 1 auto;
    }
    .panel-section-label {
      margin: 18px 0 8px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--md-on-surface-variant);
    }
    .panel-section-label:first-of-type { margin-top: 4px; }

    /* Compact tonal buttons used inside the panels. */
    .panel-btn {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      display: block;
      width: 100%;
      margin: 0 0 8px;
      padding: 12px 16px;
      border: 0;
      border-radius: 14px;
      font-family: var(--font);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.01em;
      text-align: left;
      color: var(--md-on-op);
      background: var(--md-op-container);
      cursor: pointer;
      transition: filter var(--dur-press) var(--ease-effect),
                  transform var(--dur-release) var(--ease-spatial);
      -webkit-tap-highlight-color: transparent;
    }
    .panel-btn:hover  { filter: brightness(1.08); }
    .panel-btn:active { transform: scale(0.98); filter: brightness(0.94); }
    .panel-btn:focus  { outline: none; }
    .panel-btn:focus-visible {
      outline: 2px solid var(--md-on-surface-variant);
      outline-offset: 2px;
    }
    .panel-btn small {
      display: block;
      margin-top: 3px;
      font-weight: 400;
      font-size: 11.5px;
      opacity: 0.78;
      letter-spacing: 0;
    }
    .panel-btn.is-primary { color: var(--md-on-eq); background: var(--md-eq-container); }
    .panel-btn.is-stop {
      color: #FFDAD6;
      background: #93000A;
    }

    /* Diagnostic log / report output. */
    .panel-log {
      margin: 4px 0 0;
      padding: 12px;
      border-radius: 12px;
      background: var(--md-fn-container);
      color: var(--md-on-surface);
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 11.5px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 168px;
      overflow-y: auto;
      -webkit-user-select: text;
      user-select: text;
    }
    .panel-log .ok   { color: #7FE0A8; }
    .panel-log .err  { color: #FFB4AB; }
    .panel-log .warn { color: #FFD8A8; }
    .panel-log .dim  { color: var(--md-on-surface-variant); }

    /* Key/value report rows. */
    .kv-list {
      margin: 4px 0 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px 12px;
      font-size: 12.5px;
    }
    .kv-list dt {
      color: var(--md-on-surface-variant);
      overflow-wrap: anywhere;
    }
    .kv-list dd {
      margin: 0;
      text-align: right;
      color: var(--md-on-surface);
      font-weight: 500;
      overflow-wrap: anywhere;
      -webkit-user-select: text;
      user-select: text;
    }
    .kv-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: -1px;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    /* Live theme-color swatch picker. */
    .swatch-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 4px 0 6px;
    }
    .swatch {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: transform var(--dur-press) var(--ease-effect);
      -webkit-tap-highlight-color: transparent;
    }
    .swatch:active { transform: scale(0.9); }
    .swatch.is-active { border-color: var(--md-on-surface); }

    .display-text {
      color: var(--md-on-surface);
      font-family: var(--font);
      font-weight: 400;
      font-size: 72cqh;
      line-height: 1;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      max-width: 100%;
      /* As a flex item the default min-width:auto would refuse to shrink and
         overflow the container (clipping the right-most digit on Chromium).
         min-width:0 lets it clamp to the content box; autoFitDisplay() then
         shrinks the font so nothing is ever clipped. */
      min-width: 0;
      text-align: right;
      direction: ltr;
    }

    /* ===== Bottom: keypad ===== */
    .keypad-frame {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      width: 100%;
    }

    .bottom-spacer {
      flex: 0 0 auto;
      height: clamp(34px, 11vh, 95px);
      height: max(var(--safe-bottom), clamp(34px, 11vh, 95px));
      width: 100%;
    }

    /*
     * Sizing strategy: a single square button size — the largest that fits
     * both axes — with a uniform gap, laid out as 4 columns x 5 rows. The
     * layout script overrides --btn/--gap with device-pixel-snapped values.
     */
    .keypad {
      --gap: clamp(6px, 2.1vmin, 18px);
      --pad: var(--gap);

      --max-h: calc(var(--app-h) - 25vh);
      --max-h-dvh: calc(var(--app-h) - 25vh);

      --btn-from-w: calc((100vw - 5 * var(--gap)) / 4);
      --btn-from-h: calc((var(--max-h) - 6 * var(--gap)) / 5);
      --btn: min(var(--btn-from-w), var(--btn-from-h));

      width:  calc(4 * var(--btn) + 5 * var(--gap));
      height: calc(5 * var(--btn) + 6 * var(--gap));

      display: grid;
      grid-template-columns: repeat(4, var(--btn));
      grid-template-rows:    repeat(5, var(--btn));
      gap: var(--gap);
      padding: var(--gap);
      box-sizing: border-box;

      container-type: size;
      container-name: keypad;
    }
    @supports (height: 100dvh) {
      .keypad { --btn-from-h: calc((var(--max-h-dvh) - 6 * var(--gap)) / 5); }
    }

    /* ----- Buttons (Material keys) ----- */
    .btn {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      border: 0;
      margin: 0;
      padding: 0;
      cursor: pointer;
      font-family: var(--font);
      font-weight: 400;
      font-size: 15cqw;
      line-height: 1;
      letter-spacing: 0;
      background-color: var(--md-num-container);
      color: var(--md-on-num);
      border-radius: var(--shape-key);
      overflow: hidden;
      outline: none;
      /* spring scale on press; effect spring for color. Shape stays put. */
      transition:
        transform   var(--dur-release) var(--ease-spatial),
        background-color var(--dur-press) var(--ease-effect),
        color var(--dur-press) var(--ease-effect);
      will-change: transform;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn:focus { outline: none; }
    .btn:focus-visible {
      outline: 3px solid var(--md-on-surface-variant);
      outline-offset: -4px;
    }

    /* Pressed: a gentle spring "squish" — scale only, the shape is kept
       (circles stay circular, pills stay pills). */
    .btn.is-pressed {
      transform: scale(0.92);
      transition:
        transform var(--dur-press) var(--ease-effect),
        background-color var(--dur-press) var(--ease-effect);
    }

    /* ----- Skins (color tiers) ----- */
    .btn.skin-num  { background-color: var(--md-num-container); color: var(--md-on-num); }
    .btn.skin-num.is-pressed { background-color: var(--md-num-container-press); }

    .btn.skin-fn   { background-color: var(--md-fn-container);  color: var(--md-on-fn); }
    .btn.skin-fn.is-pressed  { background-color: var(--md-fn-container-press); }

    .btn.skin-op   { background-color: var(--md-op-container);  color: var(--md-on-op); }
    .btn.skin-op.is-pressed  { background-color: var(--md-op-container-press); }

    /* Armed operator → primary "glow". The pill morph stays subtle. */
    .btn.skin-op.is-active {
      background-color: var(--md-op-active-container);
      color: var(--md-on-op-active);
    }

    /* Equals — primary filled, vertical stadium pill. */
    .btn.skin-eq {
      background-color: var(--md-eq-container);
      color: var(--md-on-eq);
      border-radius: var(--shape-pill);
    }
    .btn.skin-eq.is-pressed {
      background-color: var(--md-eq-container-press);
    }

    /* The wide "0" — horizontal stadium pill, number tier. */
    .btn.skin-num-pill {
      background-color: var(--md-num-container);
      color: var(--md-on-num);
      border-radius: var(--shape-pill);
    }
    .btn.skin-num-pill.is-pressed {
      background-color: var(--md-num-container-press);
    }

    /* ----- Ripple (state layer from contact point) ----- */
    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.22;
      transform: scale(0);
      pointer-events: none;
      z-index: 0;
      animation: ripple var(--dur-ripple) var(--ease-effect) forwards;
    }
    @keyframes ripple {
      to { transform: scale(1); opacity: 0; }
    }

    /* Grid placement (UNCHANGED layout) */
    .k-c    { grid-column: 1 / 2; grid-row: 1 / 2; }
    .k-pn   { grid-column: 2 / 3; grid-row: 1 / 2; }
    .k-div  { grid-column: 3 / 4; grid-row: 1 / 2; }
    .k-mul  { grid-column: 4 / 5; grid-row: 1 / 2; }

    .k-7    { grid-column: 1 / 2; grid-row: 2 / 3; }
    .k-8    { grid-column: 2 / 3; grid-row: 2 / 3; }
    .k-9    { grid-column: 3 / 4; grid-row: 2 / 3; }
    .k-sub  { grid-column: 4 / 5; grid-row: 2 / 3; }

    .k-4    { grid-column: 1 / 2; grid-row: 3 / 4; }
    .k-5    { grid-column: 2 / 3; grid-row: 3 / 4; }
    .k-6    { grid-column: 3 / 4; grid-row: 3 / 4; }
    .k-add  { grid-column: 4 / 5; grid-row: 3 / 4; }

    .k-1    { grid-column: 1 / 2; grid-row: 4 / 5; }
    .k-2    { grid-column: 2 / 3; grid-row: 4 / 5; }
    .k-3    { grid-column: 3 / 4; grid-row: 4 / 5; }
    .k-eq   { grid-column: 4 / 5; grid-row: 4 / 6; }

    .k-0    { grid-column: 1 / 3; grid-row: 5 / 6; }
    .k-dec  { grid-column: 3 / 4; grid-row: 5 / 6; }

    /* Text labels (digits, C/AC) sit above the ripple. */
    .btn .lbl {
      display: inline-block;
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* Operator / equals / ± glyphs are drawn as inline SVG so they are
       PERFECTLY centered regardless of font baseline metrics (Roboto's
       math-axis glyphs otherwise sit low and differ across engines). */
    .btn .glyph {
      position: relative;
      z-index: 1;
      display: block;
      width: 0.92em;
      height: 0.92em;
      pointer-events: none;
    }
    .btn .glyph line,
    .btn .glyph path {
      stroke: currentColor;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .btn .glyph circle { fill: currentColor; stroke: none; }
    /* "+" and "×" are single filled cross shapes (not two overlapping
       strokes) so their intersection renders as one solid glyph with no
       anti-aliasing seam on mobile. The path geometry has semicircular
       arm ends (radius = half the 2.1 stroke width) so the caps and weight
       match the stroked operators (− ÷ = ±) exactly. */
    .btn .glyph path.solid {
      fill: currentColor;
      stroke: none;
    }
    /* The "=" reads a touch heavier as the primary CTA. */
    .btn.skin-eq .glyph { width: 0.86em; height: 0.86em; }

    @media (max-aspect-ratio: 4 / 8) {
      .keypad { max-height: 90dvh; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <section class="display" aria-live="polite" aria-atomic="true">
      <button class="info-btn" id="info-btn" type="button" aria-label="About this calculator" aria-haspopup="dialog">
        <!-- Material Symbols "info" (outlined). -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M11 7h2v2h-2V7zm0 4h2v6h-2v-6zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
        </svg>
      </button>
      <div class="display-text" id="display">0</div>
    </section>
    <section class="keypad-frame">
      <div class="keypad" id="keypad" role="group" aria-label="Calculator keypad">
        <button class="btn skin-fn   k-c"   data-action="clear" aria-label="Clear" id="btn-clear"><span class="lbl">C</span></button>
        <button class="btn skin-op   k-pn"  data-action="posneg" aria-label="Plus minus"><svg class="glyph" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="3" x2="12" y2="13"/><line x1="6.5" y1="8" x2="17.5" y2="8"/><line x1="6" y1="18.5" x2="18" y2="18.5"/></svg></button>
        <button class="btn skin-op   k-div" data-action="op" data-op="div" aria-label="Divide"><svg class="glyph" viewBox="0 0 24 24" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><circle cx="12" cy="6.6" r="1.5"/><circle cx="12" cy="17.4" r="1.5"/></svg></button>

        <button class="btn skin-num  k-4"   data-action="digit" data-digit="4" aria-label="4"><span class="lbl">4</span></button>
        <button class="btn skin-num  k-5"   data-action="digit" data-digit="5" aria-label="5"><span class="lbl">5</span></button>

        <button class="btn skin-num  k-1"   data-action="digit" data-digit="1" aria-label="1"><span class="lbl">1</span></button>
        <button class="btn skin-num  k-2"   data-action="digit" data-digit="2" aria-label="2"><span class="lbl">2</span></button>

  <div class="overlay" id="theme-overlay" role="dialog" aria-modal="true" aria-labelledby="theme-title" hidden>
    <div class="about-card is-panel" id="theme-card">
      <header class="panel-head">
        <h2 class="panel-title" id="theme-title">Color Scheme &amp; Theme</h2>
      </header>

      <p class="panel-section-label">Set toolbar / status-bar color (live)</p>
