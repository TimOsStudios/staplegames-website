<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KBFQ2R1TS4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-KBFQ2R1TS4');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Follow Staple Games on Instagram</title>

  <style>
    :root {
      --primary-blue: #007AFF;
      --primary-purple: #af52de;
      --text-primary: #1D1D1F;
      --text-secondary: #86868B;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F5F5F7;
      --border-color: #E5E5E7;
      --shadow-light: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-medium: 0 4px 16px rgba(0,0,0,0.12);
      --border-radius: 16px;
      --border-radius-large: 24px;

      /* Instagram brand gradient stops */
      --ig-yellow: #FEDA77;
      --ig-orange: #F58529;
      --ig-pink:   #DD2A7B;
      --ig-purple: #8134AF;
      --ig-blue:   #515BD4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: linear-gradient(180deg,
        rgba(221, 42, 123, 0.10) 0%,
        rgba(245, 245, 247, 1) 30%,
        rgba(245, 245, 247, 1) 70%,
        rgba(129, 52, 175, 0.10) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Prevent pull-to-refresh in webview */
      overscroll-behavior: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    .header {
      animation: fadeIn 0.4s ease-out;
      margin-bottom: 24px;
    }

    .header-logo {
      width: 56px;
      height: 56px;
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .header p {
      font-size: 16px;
      color: var(--text-secondary);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ig-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: var(--border-radius-large);
      padding: 28px 24px 24px;
      box-shadow: var(--shadow-light);
      border: 1px solid rgba(255, 255, 255, 0.8);
      animation: slideUp 0.4s ease-out 0.05s backwards;
    }

    .ig-icon-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: linear-gradient(135deg,
        var(--ig-yellow) 0%,
        var(--ig-orange) 25%,
        var(--ig-pink) 50%,
        var(--ig-purple) 75%,
        var(--ig-blue) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(221, 42, 123, 0.28);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .ig-icon {
      width: 52px;
      height: 52px;
      color: #fff;
    }

    .ig-card h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .ig-card p {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 22px;
    }

    .ig-handle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 18px;
    }

    .ig-handle span {
      background: linear-gradient(135deg, var(--ig-pink), var(--ig-purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .follow-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 999px;
      background: linear-gradient(135deg,
        var(--ig-orange) 0%,
        var(--ig-pink) 50%,
        var(--ig-purple) 100%);
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(221, 42, 123, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .follow-btn:active {
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(221, 42, 123, 0.3);
    }

    .follow-btn svg {
      width: 22px;
      height: 22px;
    }

    .footnote {
      margin-top: 18px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Debug info - hidden by default */
    .debug-info {
      margin-top: 24px;
      padding: 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      color: var(--text-secondary);
      display: none;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .debug-info.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="images/sg-logo.svg" alt="Staple Games" class="header-logo">
      <h1>Stay in the loop</h1>
      <p>Be the first to hear about new releases and updates.</p>
    </div>

    <div class="ig-card">
      <div class="ig-icon-wrap">
        <!-- Inline Instagram glyph -->
        <svg class="ig-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="4.25" stroke="white" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1.25" fill="white"/>
        </svg>
      </div>

      <h2>Follow us on Instagram</h2>
      <p>Get the latest details on our new game releases, sneak peeks, and behind‑the‑scenes from Staple Games.</p>

      <div class="ig-handle">
        <span>@staple_games</span>
      </div>

      <a id="followBtn" href="https://www.instagram.com/staple_games/" class="follow-btn" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="4.25" stroke="white" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1.25" fill="white"/>
        </svg>
        Follow on Instagram
      </a>

      <div class="footnote">Opens the Instagram app or website</div>
    </div>

    <div class="debug-info" id="debugInfo"></div>
  </div>

  <script>
    // =============================================================================
    // CONFIG
    // =============================================================================
    const INSTAGRAM_HANDLE = 'staple_games';
    const WEB_URL = `https://www.instagram.com/${INSTAGRAM_HANDLE}/`;
    // Deep link to open the native Instagram app if installed
    const APP_URL = `instagram://user?username=${INSTAGRAM_HANDLE}`;

    // =============================================================================
    // URL PARAMETER PARSING
    // =============================================================================
    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        // Which app embedded this page (e.g. 'match-collector'). Used for logging.
        source: params.get('source') || null,
        // Platform: 'ios' or 'android' - optional, currently informational only.
        platform: params.get('platform') || null,
        // Show debug info
        debug: params.get('debug') === 'true'
      };
    }

    // =============================================================================
    // FOLLOW BUTTON BEHAVIOR
    // =============================================================================
    function setupFollowButton() {
      const params = getUrlParams();
      const btn = document.getElementById('followBtn');

      console.log('bderr: Instagram follow page params:', params);

      if (params.debug) {
        const debugInfo = document.getElementById('debugInfo');
        debugInfo.classList.add('visible');
        debugInfo.textContent =
          `params: ${JSON.stringify(params, null, 2)}\n` +
          `app url: ${APP_URL}\n` +
          `web url: ${WEB_URL}`;
      }

      btn.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('bderr: Follow on Instagram clicked. source=', params.source, 'platform=', params.platform);

        // GA4 attribution. transport_type: 'beacon' ensures the request is sent
        // even though we are about to navigate away from the page.
        if (typeof gtag !== 'undefined') {
          gtag('event', 'click', {
            event_category: 'instagram_follow',
            event_label: `${params.source || 'unknown'} - ${params.platform || 'unknown'}`,
            transport_type: 'beacon',
            value: 1
          });
        }

        // Try to open the Instagram app first, fall back to the web URL.
        let didHide = false;
        const onVisibility = () => {
          if (document.hidden) didHide = true;
        };
        document.addEventListener('visibilitychange', onVisibility);

        // Kick off the deep link attempt
        const start = Date.now();
        window.location.href = APP_URL;

        // If the app didn't open within ~800ms, fall back to the web URL.
        setTimeout(() => {
          document.removeEventListener('visibilitychange', onVisibility);
          if (!didHide && Date.now() - start < 2000) {
            console.log('bderr: Instagram app did not open, falling back to web');
            window.location.href = WEB_URL;
          }
        }, 800);
      });
    }

    // =============================================================================
    // INIT
    // =============================================================================
    document.addEventListener('DOMContentLoaded', function() {
      console.log('bderr: Instagram follow page loaded');
      setupFollowButton();
    });
  </script>
</body>
</html>
